name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    name: Update ninetrix formula
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update version and sha256 in formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          sed -i \
            -e "s|ninetrix-[0-9]*\.[0-9]*\.[0-9]*\.tar\.gz|ninetrix-${VERSION}.tar.gz|g" \
            -e "s|sha256 \".*\"|sha256 \"${SHA256}\"|g" \
            Formula/ninetrix.rb

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ninetrix.rb
          git commit -m "feat(ninetrix): update to v${VERSION}"
          git push
